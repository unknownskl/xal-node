name: Build Workflow

on:
  push:
    branches:
      - '*'
      - 'feature/*'
    tags:
      - v*
  pull_request:
    branches:
      - main
      
# env:
#   DEBUG: '*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.organization=unknownskl-github
            -Dsonar.projectKey=unknownskl_xal-node
            -Dsonar.sources=./src
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request'

      - name: Install npm dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build

      - name: Run NodeJS Tests
        run: npm run test

      # - name: Set release version
      #   run: python3 -c "import os; tag = os.environ['GITHUB_REF'].split('/')[-1]; f = open(os.environ['GITHUB_ENV'], 'a'); f.write('RELEASE_VERSION='+tag); f.close();"

  build_docs:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: ./docs
        run: npm ci
      
      - name: Build project
        working-directory: ./docs
        run: npm run build

      - name: Upload static files as artifact
        id: deployment-pages
        uses: actions/upload-pages-artifact@v4 # or specific "vX.X.X" version tag for this action
        with:
          path: docs/out/

  # Deployment job
  deploy_docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_docs
    permissions:
      id-token: write
      pages: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Deploy to GitHub Pages
        id: deployment-pages
        uses: actions/deploy-pages@v4

      - name: Info
        run: echo "Deployed to ${{ steps.deployment-pages.outputs.page_url }}"

  ###
  # Dependabot Auto-Merge Check
  ###
  dependabot-merge:
    name: "Dependabot Auto-Merge Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs: [build_docs, release]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Merge when build succeeds
        uses: actions/github-script@v9
        with:
          script: |
            console.log('Build passed, automerging Dependabot PR...');

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Build passed, automerging Dependabot PR...',
            });
            console.log('Dependabot PR approved successfully.');

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'merge',
            });
            console.log('Dependabot PR merged successfully.');